<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>祥大のお花畑 — 今日のひと花</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Shippori+Mincho:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="petals" id="petals" aria-hidden="true"></div>

<div class="temple">

  <!-- 破風（ペディメント） -->
  <header class="pediment">
    <svg class="pediment-svg" viewBox="0 0 1000 150" preserveAspectRatio="none" aria-hidden="true">
      <polygon points="500,8 992,142 8,142" fill="none" stroke="var(--accent)" stroke-width="1.5"/>
      <polygon points="500,30 940,138 60,138" fill="var(--marble-light)" stroke="var(--accent-faint)" stroke-width="1"/>
    </svg>
    <div class="pediment-text">
      <span class="latin">HORTUS FLORUM</span>
      <h1>祥大のお花畑</h1>
    </div>
  </header>

  <!-- 柱と本殿 -->
  <div class="colonnade">
    <div class="column" aria-hidden="true"><div class="capital"></div><div class="shaft"></div><div class="base"></div></div>

    <main class="sanctuary">
      <p class="date-line" id="dateLine">—</p>
      <div class="laurel" aria-hidden="true">
        <svg viewBox="0 0 120 40"><path d="M10 30 Q35 5 60 8 Q85 5 110 30" fill="none" stroke="var(--accent)" stroke-width="1.2"/><circle cx="60" cy="8" r="2.2" fill="var(--accent)"/></svg>
      </div>

      <p class="label">今日の花</p>
      <h2 class="flower-name" id="flowerName">…</h2>

      <p class="label">花言葉</p>
      <p class="meaning" id="flowerMeaning">…</p>

      <div class="divider" aria-hidden="true">❀</div>

      <p class="label">今日、がんばれること</p>
      <p class="message" id="flowerMessage">…</p>

      <!-- 日付から探す -->
      <div class="date-picker">
        <label for="datePick">他の日の花を訪ねる</label>
        <input type="date" id="datePick">
        <button id="todayBtn" type="button">今日に戻る</button>
      </div>

      <!-- 花から探す -->
      <div class="flower-search">
        <label for="flowerSearch">花の名前・花言葉から探す</label>
        <div class="search-row">
          <input type="text" id="flowerSearch" list="flowerList"
                 placeholder="例：ヒマワリ、勇気 …" autocomplete="off">
          <datalist id="flowerList"></datalist>
        </div>
        <ul class="search-results" id="searchResults"></ul>
      </div>
    </main>

    <div class="column" aria-hidden="true"><div class="capital"></div><div class="shaft"></div><div class="base"></div></div>
  </div>

  <!-- 基壇 -->
  <footer class="stylobate">
    <div class="step"></div>
    <div class="step"></div>
    <p class="credit">移ろう季節に、今日だけの一輪を。</p>
  </footer>

</div>

<script src="data/data-01.js"></script>
<script src="data/data-02.js"></script>
<script src="data/data-03.js"></script>
<script src="data/data-04.js"></script>
<script src="data/data-05.js"></script>
<script src="data/data-06.js"></script>
<script src="data/data-07.js"></script>
<script src="data/data-08.js"></script>
<script src="data/data-09.js"></script>
<script src="data/data-10.js"></script>
<script src="data/data-11.js"></script>
<script src="data/data-12.js"></script>
<script src="script.js"></script>
</body>
</html>
