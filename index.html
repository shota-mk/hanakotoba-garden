<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>祥大のお花畑</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Shippori+Mincho:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=5">
</head>
<body>

<div class="grain" aria-hidden="true"></div>

<header class="masthead">
  <h1>祥大のお花畑</h1>
  <p class="masthead-note">HORTUS FLORUM — A FLOWER A DAY</p>
</header>

<main>
  <section class="hero" id="hero">

    <div class="hero-date">
      <p class="date-en" id="dateEn">—</p>
      <p class="date-num" id="dateNum">00</p>
      <p class="date-meta" id="dateMeta">—</p>
      <p class="specimen" id="specimen">No.000 / 366</p>
      <div class="year-line" aria-hidden="true"><span class="year-dot" id="yearDot"></span></div>
    </div>

    <div class="hero-main">
      <div class="red-sun" aria-hidden="true"></div>
      <p class="kicker">TODAY'S FLOWER<span class="kicker-jp">今日の花</span></p>
      <h2 class="flower" id="flowerName">…</h2>
      <p class="meaning" id="flowerMeaning">…</p>
      <p class="message-label">今日を生きる、あなたへ</p>
      <p class="message" id="flowerMessage">…</p>
    </div>

    <p class="vertical" aria-hidden="true">一日一花、言葉を胸に</p>
  </section>

  <section class="controls">
    <div class="control date-control">
      <label for="datePick">DATE — 日付から</label>
      <div class="control-row">
        <input type="date" id="datePick">
        <button id="todayBtn" type="button">TODAY ↺</button>
      </div>
    </div>
    <div class="control search-control">
      <label for="flowerSearch">INDEX — 花・花言葉から</label>
      <div class="control-row">
        <input type="text" id="flowerSearch" list="flowerList" placeholder="ヒマワリ、勇気 …" autocomplete="off">
        <datalist id="flowerList"></datalist>
      </div>
    </div>
  </section>

  <ul class="results" id="searchResults"></ul>
</main>

<footer class="marquee" aria-hidden="true">
  <div class="marquee-track" id="marqueeTrack"></div>
</footer>

<script src="data/data-01.js?v=5"></script>
<script src="data/data-02.js?v=5"></script>
<script src="data/data-03.js?v=5"></script>
<script src="data/data-04.js?v=5"></script>
<script src="data/data-05.js?v=5"></script>
<script src="data/data-06.js?v=5"></script>
<script src="data/data-07.js?v=5"></script>
<script src="data/data-08.js?v=5"></script>
<script src="data/data-09.js?v=5"></script>
<script src="data/data-10.js?v=5"></script>
<script src="data/data-11.js?v=5"></script>
<script src="data/data-12.js?v=5"></script>
<script src="script.js?v=5"></script>
</body>
</html>
